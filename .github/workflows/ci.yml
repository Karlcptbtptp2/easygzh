name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download dependencies
        run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -race
      - name: Build
        run: go build -ldflags "-s -w" -o easygzh ./cmd/easygzh
      - name: Smoke test
        run: |
          ./easygzh version
          ./easygzh theme list
          ./easygzh convert testdata/fixtures/sample1.md --theme default -o /tmp/out.html
          test -s /tmp/out.html && echo "convert OK"
