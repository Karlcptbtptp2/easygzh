name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Cross-compile
        run: make release
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
