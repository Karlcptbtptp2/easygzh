<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>easyGZH 内页2 - 三步流程</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    font-family: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(160deg, #FFF5E6 0%, #FFE6E6 100%);
    overflow: hidden; position: relative;
  }
  .deco { position: absolute; border-radius: 50%; opacity: 0.1; }
  .deco-1 { width: 360px; height: 360px; background: #FFB347; top: -80px; left: -100px; }
  .deco-2 { width: 300px; height: 300px; background: #C77DFF; bottom: 40px; right: -100px; }

  .wrap {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 90px 70px;
  }

  .title { text-align: center; margin-bottom: 60px; }
  .title h1 {
    font-size: 64px; font-weight: 900; color: #2D2D2D; line-height: 1.2;
  }
  .title .sub {
    font-size: 30px; color: #888; margin-top: 16px; font-weight: 400;
  }

  .steps {
    flex: 1; display: flex; flex-direction: column; gap: 36px;
    justify-content: center;
  }

  .step {
    display: flex; align-items: center; gap: 36px;
    background: #FFF; border-radius: 28px; padding: 40px 44px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    position: relative;
  }

  .step-num {
    width: 90px; height: 90px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; font-weight: 900; color: #FFF;
    flex-shrink: 0;
  }
  .step:nth-child(1) .step-num { background: #FFB347; }
  .step:nth-child(2) .step-num { background: #FF6B9D; }
  .step:nth-child(3) .step-num { background: #C77DFF; }

  .step-body { flex: 1; }
  .step-emoji { font-size: 44px; margin-bottom: 6px; }
  .step-title {
    font-size: 38px; font-weight: 700; color: #2D2D2D; margin-bottom: 8px;
  }
  .step-desc {
    font-size: 26px; color: #888; line-height: 1.5;
  }

  .step-arrow {
    position: absolute; left: 50%; transform: translateX(-50%);
    bottom: -28px; font-size: 36px; color: #FF6B9D; font-weight: 900;
    z-index: 20;
    width: 40px; height: 40px; border-radius: 50%;
    background: #FFF; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .step:last-child .step-arrow { display: none; }

  .footer {
    text-align: center; margin-top: 50px;
  }
  .footer-cta {
    display: inline-block;
    background: linear-gradient(135deg, #FF6B9D, #C77DFF);
    color: #FFF; font-size: 34px; font-weight: 700;
    padding: 22px 60px; border-radius: 50px;
    box-shadow: 0 6px 24px rgba(255,107,157,0.3);
  }
</style>
</head>
<body>
  <div class="deco deco-1"></div>
  <div class="deco deco-2"></div>

  <div class="wrap">
    <div class="title">
      <h1>就这么简单，三步搞定</h1>
      <div class="sub">不用学复杂操作，跟 Agent 说话就行</div>
    </div>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-body">
          <div class="step-emoji">💬</div>
          <div class="step-title">把文章发给 Agent</div>
          <div class="step-desc">粘贴文字、给个文件都行，说什么语言都可以</div>
        </div>
        <div class="step-arrow">↓</div>
      </div>

      <div class="step">
        <div class="step-num">2</div>
        <div class="step-body">
          <div class="step-emoji">🎨</div>
          <div class="step-title">Agent 帮你排好版</div>
          <div class="step-desc">自动套用你号的风格，标题、间距、配色都一致</div>
        </div>
        <div class="step-arrow">↓</div>
      </div>

      <div class="step">
        <div class="step-num">3</div>
        <div class="step-body">
          <div class="step-emoji">🚀</div>
          <div class="step-title">推到草稿箱，搞定</div>
          <div class="step-desc">公众号后台直接能看到，检查完就能发</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-cta">✨ 排过一次，以后都这个味儿</div>
    </div>
  </div>
</body>
</html>
