<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>easyGZH 内页3 - 核心卖点</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    font-family: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(160deg, #FFF5E6 0%, #FFE6E6 100%);
    overflow: hidden; position: relative;
  }
  .deco { position: absolute; border-radius: 50%; opacity: 0.1; }
  .deco-1 { width: 380px; height: 380px; background: #FF6B9D; top: -100px; right: -120px; }
  .deco-2 { width: 260px; height: 260px; background: #FFB347; bottom: -60px; left: -80px; }

  .wrap {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 90px 70px;
  }

  .title { text-align: center; margin-bottom: 50px; }
  .title h1 {
    font-size: 64px; font-weight: 900; color: #2D2D2D; line-height: 1.2;
  }
  .title .sub {
    font-size: 30px; color: #888; margin-top: 16px; font-weight: 400;
  }

  .cards {
    flex: 1; display: flex; flex-direction: column; gap: 30px;
    justify-content: center;
  }

  .card {
    background: #FFF; border-radius: 28px; padding: 44px 48px;
    display: flex; align-items: center; gap: 36px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 8px;
  }
  .card:nth-child(1)::before { background: #FF6B9D; }
  .card:nth-child(2)::before { background: #FFB347; }
  .card:nth-child(3)::before { background: #C77DFF; }

  .card-icon {
    width: 110px; height: 110px; border-radius: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 60px; flex-shrink: 0;
  }
  .card:nth-child(1) .card-icon { background: rgba(255,107,157,0.12); }
  .card:nth-child(2) .card-icon { background: rgba(255,179,71,0.15); }
  .card:nth-child(3) .card-icon { background: rgba(199,125,255,0.12); }

  .card-body { flex: 1; }
  .card-title {
    font-size: 40px; font-weight: 700; color: #2D2D2D; margin-bottom: 10px;
  }
  .card-desc {
    font-size: 27px; color: #777; line-height: 1.5;
  }
  .card-tag {
    display: inline-block; margin-top: 14px;
    font-size: 22px; font-weight: 500;
    padding: 6px 18px; border-radius: 20px;
  }
  .card:nth-child(1) .card-tag { background: rgba(255,107,157,0.1); color: #FF6B9D; }
  .card:nth-child(2) .card-tag { background: rgba(255,179,71,0.12); color: #E89500; }
  .card:nth-child(3) .card-tag { background: rgba(199,125,255,0.1); color: #C77DFF; }

  .footer {
    text-align: center; margin-top: 40px;
  }
  .footer-line1 {
    font-size: 32px; font-weight: 700; color: #2D2D2D; margin-bottom: 14px;
  }
  .footer-line2 {
    font-size: 26px; color: #999; font-weight: 400;
  }
  .footer-line2 code {
    background: #F5F5F5; padding: 4px 14px; border-radius: 8px;
    font-family: 'SF Mono', 'Menlo', monospace; font-size: 24px; color: #FF6B9D;
  }
</style>
</head>
<body>
  <div class="deco deco-1"></div>
  <div class="deco deco-2"></div>

  <div class="wrap">
    <div class="title">
      <h1>为什么选 easyGZH</h1>
      <div class="sub">三个别人没有，只有它有的本事</div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-icon">🧠</div>
        <div class="card-body">
          <div class="card-title">记住你号的风格</div>
          <div class="card-desc">排过一次，配色、字号、间距都记下来<br>以后每篇文章自动保持一致</div>
          <div class="card-tag">✦ 独家能力，竞品都没有</div>
        </div>
      </div>

      <div class="card">
        <div class="card-icon">⚡</div>
        <div class="card-body">
          <div class="card-title">本地渲染，不绑付费</div>
          <div class="card-desc">在你电脑上跑，不调任何付费 API<br>发布只用你自己的公众号凭证</div>
          <div class="card-tag">✦ 零成本，零绑定</div>
        </div>
      </div>

      <div class="card">
        <div class="card-icon">💚</div>
        <div class="card-body">
          <div class="card-title">开源免费，MIT 协议</div>
          <div class="card-desc">代码全公开，想改就改，想审就审<br>不藏着掖着，不像那些闭源工具</div>
          <div class="card-tag">✦ 代码透明，用着放心</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-line1">让你的 Agent 帮你排版</div>
      <div class="footer-line2"><code>github.com/Karlcptbtptp2/easygzh</code></div>
    </div>
  </div>
</body>
</html>
