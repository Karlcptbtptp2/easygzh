<!--
  template:
  name: product-launch
  description: 产品发布风格——醒目标题、痛点气泡、特性列表、对比表、CTA按钮
-->
<style data-template-css>
.eg-brand-label { font-size:12px; color:#999; letter-spacing:2px; text-transform:uppercase; }
.eg-brand-date { font-size:11px; color:#bbb; text-align:right; margin-top:4px; }
.eg-divider-solid { margin:0; padding:0; border-top:1px solid #E0E0E0; font-size:0; line-height:0; margin-top:12px; }
.eg-hook-eyebrow { font-size:13px; color:#E8923C; letter-spacing:2px; margin-bottom:12px; }
.eg-hook-title { font-size:28px; font-weight:bold; color:#2D2D2D; line-height:1.3; margin-bottom:16px; }
.eg-hook-lead { font-size:15px; color:#666; line-height:1.8; }
.eg-pill-btn { display:inline-block; background:#E8923C; color:#fff; font-size:14px; letter-spacing:2px; padding:10px 36px; border-radius:24px; }
.eg-bubble { margin:8px 0; padding:10px 18px; border-radius:16px; display:inline-block; font-size:14px; line-height:1.6; }
.eg-bubble-red { background:#FFF0F0; color:#C44; }
.eg-bubble-orange { background:#FFF5EF; color:#E8683A; }
.eg-bubble-blue { background:#F0F5FF; color:#3B6; }
.eg-cta-text { font-size:14px; color:#888; line-height:1.8; margin-top:24px; text-align:center; }
.eg-footer-brand { font-size:12px; color:#999; letter-spacing:2px; text-align:center; }
</style>

<!-- slot: brand -->
<section style="margin:0 0 24px 0; padding:0 18px;">
  <section class="eg-brand-label">{{BRAND_LABEL}}</section>
  <section class="eg-brand-date">{{BRAND_DATE}}</section>
  <p class="eg-divider-solid">&nbsp;</p>
</section>

<!-- slot: hook -->
<section style="margin:40px 0; padding:0 18px;">
  <section class="eg-hook-eyebrow">{{SUBTITLE}}</section>
  <section class="eg-hook-title">{{TITLE}}</section>
  <section class="eg-hook-lead">{{CTA_TEXT}}</section>
  <section style="margin-top:20px;">
    <span class="eg-pill-btn">了解更多</span>
  </section>
</section>

<!-- slot: body -->
<!-- engine injects goldmark-rendered HTML here -->

<!-- slot: cta -->
<section style="margin:40px 0 48px 0; padding:0 18px; text-align:center;">
  <p class="eg-divider-solid" style="margin-bottom:24px;">&nbsp;</p>
  <section style="margin-bottom:20px;">
    <span class="eg-pill-btn">立即体验</span>
  </section>
  <section class="eg-cta-text">
    觉得有用？转发给需要的朋友。<br/>有问题？评论区告诉我。
  </section>
  <section style="margin-top:32px;">
    <section class="eg-footer-brand">{{BRAND_FOOTER}}</section>
  </section>
</section>
