<!--
  template:
  name: mindful-journal
  description: 正念冥想风格——慢节奏、留白、金句引用、反思提问
-->
<style data-template-css>
.eg-brand-label { font-size:13px; color:#7A7A7A; font-style:italic; letter-spacing:1px; }
.eg-brand-date { font-size:11px; color:#999; text-align:right; margin-top:4px; letter-spacing:2px; }
.eg-divider-solid { margin:0; padding:0; border-top:1px solid #D5CFC6; font-size:0; line-height:0; margin-top:12px; }
.eg-hook-title { font-size:32px; font-weight:normal; color:#2D2D2D; line-height:1.2; margin-bottom:16px; }
.eg-hook-lead { font-size:15px; color:#666; line-height:1.8; }
.eg-section-label { font-size:11px; color:#666; letter-spacing:2px; }
.eg-section-dot { font-size:14px; color:#2D2D2D; text-align:right; margin-top:4px; }
.eg-divider-thin { margin:0; padding:0; border-top:1px solid #D5CFC6; font-size:0; line-height:0; margin-top:8px; }
.eg-quote-card { margin:28px 0; padding:18px 18px 18px 22px; background:#F5F3EF; border-left:3px solid #7A8B6E; }
.eg-quote-text { font-size:15px; color:#555; line-height:1.8; font-style:italic; }
.eg-tip-card { margin:28px 0; padding:20px; background:#F5F3EF; }
.eg-tip-emoji { font-size:18px; color:#7A8B6E; margin-bottom:8px; }
.eg-tip-text { font-size:15px; color:#555; line-height:1.8; }
.eg-cta-text { font-size:14px; color:#888; line-height:1.8; margin-top:24px; }
.eg-footer-dot { font-size:14px; color:#2D2D2D; margin-bottom:8px; }
.eg-footer-brand { text-align:right; font-size:11px; color:#666; letter-spacing:2px; }
.eg-spacer { margin:24px 0; }
</style>

<!-- slot: brand -->
<section style="margin:0 0 24px 0; padding:0 18px;">
  <section class="eg-brand-label">{{BRAND_LABEL}}</section>
  <section class="eg-brand-date">{{BRAND_DATE}}</section>
  <p class="eg-divider-solid">&nbsp;</p>
</section>

<!-- slot: hook -->
<section style="margin:40px 0; padding:0 18px;">
  <section class="eg-hook-title">{{TITLE}}</section>
  <section class="eg-hook-lead">{{SUBTITLE}}</section>
</section>

<!-- slot: body -->
<!-- engine injects goldmark-rendered HTML here -->

<!-- slot: cta -->
<section style="margin:40px 0 48px 0; padding:0 18px;">
  <p class="eg-divider-solid" style="margin-bottom:24px;">&nbsp;</p>
  <section class="eg-cta-text">
    留言告诉我，你这个月的新发现是什么？<br/>转发给需要的朋友，一起练习正念生活。
  </section>
  <section style="margin-top:32px;">
    <section class="eg-footer-dot">●</section>
    <section class="eg-footer-brand">{{BRAND_FOOTER}}</section>
  </section>
</section>
