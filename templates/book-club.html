<!--
  template:
  name: book-club
  description: 文艺读书俱乐部风格——居中标题、胶囊按钮、气泡标签、温暖社群感
-->
<style data-template-css>
.eg-brand-label { font-size:14px; color:#7A7A7A; font-style:italic; letter-spacing:1px; text-align:center; }
.eg-divider-dashed { margin:0; padding:0; border-top:1px dashed #D5CFC6; font-size:0; line-height:0; margin-top:12px; }
.eg-hook-eyebrow { font-size:13px; color:#888; letter-spacing:2px; margin-bottom:12px; text-align:center; }
.eg-hook-title { font-size:32px; font-weight:normal; color:#2D2D2D; line-height:1.2; margin-bottom:16px; text-align:center; }
.eg-hook-sub { font-size:13px; color:#888; line-height:1.6; text-align:center; }
.eg-pill-btn { display:inline-block; background:#E8923C; color:#fff; font-size:13px; letter-spacing:1px; padding:8px 28px; border-radius:20px; }
.eg-bubble { margin:12px 0; padding:10px 18px; border-radius:16px; display:inline-block; font-size:14px; line-height:1.6; }
.eg-bubble-green { background:#E8F0E8; color:#5A7D5A; }
.eg-bubble-pink { background:#F5E0D6; color:#9C6B4F; }
.eg-bubble-yellow { background:#F8E8C8; color:#8B7355; }
.eg-cta-text { font-size:13px; color:#888; line-height:1.8; text-align:center; margin-top:24px; }
.eg-footer-brand { font-size:12px; color:#999; letter-spacing:2px; text-align:center; }
.eg-footer-slogan { font-size:11px; color:#aaa; margin-top:8px; text-align:center; }
</style>

<!-- slot: brand -->
<section style="margin:0 0 24px 0; padding:0 18px;">
  <section class="eg-brand-label">{{BRAND_LABEL}}</section>
  <p class="eg-divider-dashed">&nbsp;</p>
</section>

<!-- slot: hook -->
<section style="margin:40px 0; padding:0 18px; text-align:center;">
  <section class="eg-hook-eyebrow">{{SUBTITLE}}</section>
  <section class="eg-hook-title">{{TITLE}}</section>
  <section style="margin-top:20px;">
    <span class="eg-pill-btn">{{CTA_TEXT}}</span>
  </section>
</section>

<!-- slot: body -->
<!-- engine injects goldmark-rendered HTML here -->

<!-- slot: cta -->
<section style="margin:40px 0 48px 0; padding:0 18px; text-align:center;">
  <p class="eg-divider-dashed" style="margin-bottom:24px;">&nbsp;</p>
  <section class="eg-cta-text">
    留言告诉我，你最近在读什么书？<br/>转发给朋友，一起组建属于你们的读书会。
  </section>
  <section style="margin-top:40px;">
    <section class="eg-footer-brand">✦ {{BRAND_FOOTER}} ✦</section>
    <section class="eg-footer-slogan">{{BRAND_LABEL}}</section>
  </section>
</section>
